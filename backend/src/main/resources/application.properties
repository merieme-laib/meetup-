# spring.application.name=backend
# Base de données PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/meetuptech
spring.datasource.username=meetuptech
spring.datasource.password=meetuptech123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Serveur
server.port=8080

# Nom de l'application
spring.application.name=meetuptech-backend

# JWT
jwt.secret=meetuptech_secret_key_very_long_and_secure_2025
jwt.expiration=86400000