stages:
  - build
  - sonarqube-check
  - deploy

variables:
  VM_IP: "192.168.75.120"
  REMOTE_FRONT_PATH: "/var/www/ellevent"
  REMOTE_BACK_PATH: "/home/gitlabci/backend.jar"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  MAVEN_OPTS: "-Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository"

cache:
  paths:
    - .sonar/cache
    - .m2/repository
    - frontend/node_modules/

# 🔹 BUILD FRONT
build_front:
  stage: build
  image: node:22-alpine
  script:
    - cd frontend
    - npm install  # Utilise install au lieu de ci si tu n'as pas de lockfile
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "BrancheMiloud"

# 🔹 BUILD BACK + SONAR
sonarqube-check:
  stage: sonarqube-check
  image: maven:3-eclipse-temurin-21
  before_script:
    - mkdir -p ~/.m2
    - |
      cat > ~/.m2/settings.xml << 'EOF'
      <settings>
        <proxies>
          <proxy>
            <id>lyon1-proxy</id>
            <active>true</active>
            <protocol>http</protocol>
            <host>proxy.univ-lyon1.fr</host>
            <port>3128</port>
          </proxy>
        </proxies>
      </settings>
      EOF
  script:
    - cd backend
    - mvn clean package -DskipTests
    - mvn sonar:sonar -Dsonar.login=$SONAR_TOKEN
  artifacts:
    paths:
      - backend/target/*.jar
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "BrancheMiloud"

# 🔹 DEPLOY (Uniquement sur main pour ne pas casser la VM des collègues)
deploy_backend:
  stage: deploy
  image: maven:3-eclipse-temurin-21
  script:
    - echo "Déploiement réservé au main"
  only:
    - main