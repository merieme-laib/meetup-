image: node:22-alpine

stages:
  - quality
  - deploy

variables:
  VM_IP: "192.168.75.120"
  REMOTE_PATH: "/var/www/ellevent"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

cache:
  paths:
    - node_modules/
    - .sonar/cache

sonarqube:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.token="$SONAR_TOKEN"
  only:
    - main

# OPTIONNEL (tu peux même supprimer si GitLab free)
sonarqube-vulnerability-report:
  stage: quality
  script:
    - apk add --no-cache curl
    - 'curl -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/issues/gitlab_sast_export?projectKey=m1if10-2025-g02_gp2m1_AZ0gpAA6pItf3KCWeG_Y&branch=${CI_COMMIT_BRANCH}" -o gl-sast-sonar-report.json'
  allow_failure: true
  only:
    - main
  artifacts:
    expire_in: 1 day
    reports:
      sast: gl-sast-sonar-report.json

deploy:
  stage: deploy
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - chmod 400 "$CI_SSH_KEY"
  script:
    - npm ci
    - npm run build
    - scp -o StrictHostKeyChecking=no -i "$CI_SSH_KEY" -r dist/* "gitlabci@${VM_IP}:${REMOTE_PATH}/"