image: node:22-alpine

stages:
  - quality
  - build
  - deploy

variables:
  VM_IP: "192.168.75.120"
  REMOTE_PATH: "/var/www/ellevent"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

cache:
  paths:
    - node_modules/
    - .sonar/cache

#  SONAR (FRONT + BACK)
sonarqube:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.token="$SONAR_TOKEN"
  only:
    - main

# BUILD FRONT
build_front:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - main

# BUILD BACK
build_backend:
  stage: build
  image: maven:3-eclipse-temurin-21
  script:
    - cd backend
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
  only:
    - main
  allow_failure: true  # ← important si Maven casse (réseau)

# DEPLOY FRONT
deploy:
  stage: deploy
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - chmod 400 "$CI_SSH_KEY"
  script:
    - scp -o StrictHostKeyChecking=no -i "$CI_SSH_KEY" -r dist/* "gitlabci@${VM_IP}:${REMOTE_PATH}/"image: node:22-alpine

