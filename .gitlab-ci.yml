image: node:22-alpine

stages:
  - build
  - quality
  - deploy

variables:
  VM_IP: "192.168.75.120"
  REMOTE_FRONT_PATH: "/var/www/ellevent"
  REMOTE_BACK_PATH: "/home/gitlabci/backend.jar"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

cache:
  paths:
    - node_modules/
    - .sonar/cache

build_front:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - main

build_backend:
  stage: build
  image: maven:3-eclipse-temurin-21
  script:
    - cd backend
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
  only:
    - main

sonarqube:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
  dependencies:
    - build_backend
  script:
    - sonar-scanner -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.token="$SONAR_TOKEN"
  only:
    - main

deploy_front:
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client
    - chmod 400 "$CI_SSH_KEY"
  script:
    - scp -o StrictHostKeyChecking=no -i "$CI_SSH_KEY" -r dist/* "gitlabci@${VM_IP}:${REMOTE_FRONT_PATH}/"
  dependencies:
    - build_front
  only:
    - main

deploy_backend:
  stage: deploy
  image: maven:3-eclipse-temurin-21
  before_script:
    - apt-get update && apt-get install -y openssh-client
    - chmod 400 "$CI_SSH_KEY"
  script:
    - scp -o StrictHostKeyChecking=no -i "$CI_SSH_KEY" backend/target/*.jar "gitlabci@${VM_IP}:${REMOTE_BACK_PATH}"
    - |
      ssh -o StrictHostKeyChecking=no -i "$CI_SSH_KEY" gitlabci@${VM_IP} '
        pkill -f backend.jar || true
        nohup java -jar /home/gitlabci/backend.jar > /home/gitlabci/backend.log 2>&1 &
      '
  dependencies:
    - build_backend
  only:
    - main