stages:
  - build
  - sonarqube-check
  - deploy

variables:
  VM_IP: "192.168.75.120"
  REMOTE_FRONT_PATH: "/var/www/ellevent"
  REMOTE_BACK_PATH: "/home/gitlabci/backend.jar"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"
  MAVEN_OPTS: "-Dmaven.repo.local=${CI_PROJECT_DIR}/.m2/repository"

cache:
  paths:
    - .sonar/cache
    - .m2/repository
    - frontend/node_modules/

# BUILD FRONT
build_front:
  stage: build
  image: node:22-alpine
  script:
    - cd frontend
    - export VITE_API_URL=$VITE_API_URL
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
  only:
    - main

# BUILD BACK + SONAR
sonarqube-check:
  stage: sonarqube-check
  image: maven:3-eclipse-temurin-21
  before_script:
    - mkdir -p ~/.m2
    - |
      cat > ~/.m2/settings.xml << 'EOF'
      <settings>
        <proxies>
          <proxy>
            <id>lyon1-proxy</id>
            <active>true</active>
            <protocol>http</protocol>
            <host>proxy.univ-lyon1.fr</host>
            <port>3128</port>
          </proxy>
        </proxies>
      </settings>
      EOF
  script:
    - cd backend
    - mvn dependency:go-offline
    - mvn clean package -DskipTests
    - mvn sonar:sonar
  artifacts:
    paths:
      - backend/target/*.jar
  only:
    - main

# DEPLOY FRONT
deploy_front:
  stage: deploy
  image: node:22-alpine
  before_script:
    - apk add --no-cache openssh-client
    - chmod 400 "$CI_SSH_KEY"
  script:
    - scp -o StrictHostKeyChecking=no -i "$CI_SSH_KEY" -r frontend/dist/* "gitlabci@${VM_IP}:${REMOTE_FRONT_PATH}/"
  dependencies:
    - build_front
  only:
    - main

# DEPLOY BACKEND
deploy_backend:
  stage: deploy
  image: maven:3-eclipse-temurin-21
  before_script:
    - apt-get update && apt-get install -y openssh-client
    - chmod 400 "$CI_SSH_KEY"
  script:
    - ls -l backend/target || true
    - scp -o StrictHostKeyChecking=no -i "$CI_SSH_KEY" backend/target/*.jar "gitlabci@${VM_IP}:${REMOTE_BACK_PATH}"
    - |
      ssh -o StrictHostKeyChecking=no -i "$CI_SSH_KEY" gitlabci@${VM_IP} "bash -lc '
        set -ex
        command -v java >/dev/null
        test -f /home/gitlabci/backend.jar
        fuser -k 8080/tcp || true
        nohup java -Dspring.datasource.password=$DB_PASSWORD -jar /home/gitlabci/backend.jar > /home/gitlabci/backend.log 2>&1 < /dev/null &
        sleep 3
        if ! pgrep -f \"/home/gitlabci/backend.jar\" >/dev/null; then
          echo \"Echec de demarrage backend, log: \"
          tail -n 80 /home/gitlabci/backend.log || true
          exit 1
        fi
      '"
  dependencies:
    - sonarqube-check
  only:
    - main
